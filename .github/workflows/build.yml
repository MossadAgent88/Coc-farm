name: Build and Publish Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.5.5"
        required: false
        default: "v1.5.5"

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-build.txt
          python -c "from PySide6.QtWebEngineWidgets import QWebEngineView; print('PySide6 QtWebEngine import OK')"

      - name: Syntax check
        shell: pwsh
        run: |
          python -m py_compile gui.py bot_controller.py cocbot\io.py cocbot\actions.py cocbot\__main__.py cocbot\loop.py

      - name: Resolve release tag and version
        id: release_tag
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
          } elseif ("${{ inputs.tag }}") {
            $tag = "${{ inputs.tag }}"
          } else {
            $tag = "v1.5.5"
          }
          if (-not $tag.StartsWith("v")) { $tag = "v$tag" }
          $version = $tag.TrimStart("v")
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build Windows app and release ZIP
        shell: pwsh
        run: |
          .\scripts\package_windows_release.ps1 -Build -Version "${{ steps.release_tag.outputs.version }}" -OutputDir "release"
          if (!(Test-Path "release\CoC-Farm-Bot-Windows.zip")) {
            throw "Missing release ZIP"
          }
          if (!(Test-Path "release\CoC-Farm-Bot-Windows.zip.sha256")) {
            throw "Missing checksum"
          }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: CoC Farm Bot v${{ steps.release_tag.outputs.version }}
          body_path: release_assets/RELEASE_NOTES_${{ steps.release_tag.outputs.tag }}.md
          make_latest: true
          files: |
            release/CoC-Farm-Bot-Windows.zip
            release/CoC-Farm-Bot-Windows.zip.sha256
          draft: false
          prerelease: false
