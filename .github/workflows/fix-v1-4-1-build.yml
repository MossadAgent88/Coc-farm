name: Fix and build v1.4.1

on:
  push:
    paths:
      - .github/workflows/fix-v1-4-1-build.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Patch source
        run: python .github/scripts/fix_v141.py

      - name: Validate source
        run: python -m py_compile cocbot/event_broom.py cocbot/config.py cocbot/updater.py cocbot/actions.py cocbot/loop.py cocbot/__init__.py gui.py test_event_broom.py

      - name: Commit source fixes
        id: commit
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add cocbot/event_broom.py cocbot/config.py cocbot/updater.py cocbot/__init__.py gui.py .github/workflows/fix-v1-4-1-build.yml .github/scripts/fix_v141.py
          git commit -m "Fix Broom Witch deploy, stop flow, and updater packaging"
          git push
          $sha = git rev-parse HEAD
          "sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build stable Windows folder package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          pyinstaller --noconfirm --clean --onedir --windowed --name cocbot --add-data "templates;templates" --collect-all customtkinter --collect-all PIL --hidden-import customtkinter --hidden-import PIL.Image --hidden-import cv2 gui.py
          if (!(Test-Path "dist/cocbot/cocbot.exe")) { throw "onedir EXE was not created" }
          Compress-Archive -Path "dist/cocbot/*" -DestinationPath "cocbot-windows-v1.4.1.zip" -Force

      - name: Build legacy single EXE for old updater compatibility
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          pyinstaller --noconfirm --clean --onefile --windowed --name cocbot --distpath dist-onefile --workpath build-onefile --specpath spec-onefile --add-data "templates;templates" --collect-all customtkinter --collect-all PIL --hidden-import customtkinter --hidden-import PIL.Image --hidden-import cv2 gui.py
          if (!(Test-Path "dist-onefile/cocbot.exe")) { throw "onefile EXE was not created" }

      - name: Publish v1.4.1 release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $sha = '${{ steps.commit.outputs.sha }}'
          $notes = @'
          ## v1.4.1 Reliability Fix

          - Fixed Broom Witch event deployment only using one selected troop slot.
          - Added configurable multi-slot event deployment: `broom_witch_slot_xs` defaults to `250,330,410,490`.
          - Made Stop non-blocking so the GUI does not freeze while Windows kills the bot/ADB process tree.
          - Fixed updater asset detection and added stable ZIP package updates.
          - Published both a reliable Windows ZIP package and a legacy `cocbot.exe` for old updater compatibility.

          Recommended download: `cocbot-windows-v1.4.1.zip`.
          '@
          if (gh release view v1.4.1 *> $null) {
            gh release edit v1.4.1 --target $sha --title "v1.4.1 - Stability and Broom Witch Fix" --notes $notes
          } else {
            gh release create v1.4.1 --target $sha --title "v1.4.1 - Stability and Broom Witch Fix" --notes $notes
          }
          gh release upload v1.4.1 "cocbot-windows-v1.4.1.zip" "dist-onefile/cocbot.exe" --clobber
