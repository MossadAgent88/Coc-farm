name: Publish v1.5.0 fixed package

on:
  push:
    paths:
      - .github/workflows/publish-v1-5-0.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate source and tests
        shell: pwsh
        run: |
          python -m py_compile cocbot/army.py cocbot/event_broom.py cocbot/config.py cocbot/updater.py cocbot/actions.py cocbot/loop.py cocbot/__main__.py cocbot/__init__.py gui.py test_event_broom.py
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt pytest
          pytest -q test_event_broom.py

      - name: Build fixed-name package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          python -m pip install pyinstaller
          pyinstaller --noconfirm --clean --onedir --windowed --name Coc-farm --add-data "templates;templates" --collect-all customtkinter --collect-all PIL --hidden-import customtkinter --hidden-import PIL.Image --hidden-import cv2 gui.py
          if (!(Test-Path "dist/Coc-farm/Coc-farm.exe")) { throw "dist/Coc-farm/Coc-farm.exe was not created" }
          Compress-Archive -Path "dist/Coc-farm/*" -DestinationPath "Coc-farm.zip" -Force
          if (!(Test-Path "Coc-farm.zip")) { throw "Coc-farm.zip was not created" }

      - name: Publish release via API
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $repo = '${{ github.repository }}'
          $tag = 'v1.5.0'
          $zip = 'Coc-farm.zip'
          $sha = '${{ github.sha }}'
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            'X-GitHub-Api-Version' = '2022-11-28'
          }
          $api = "https://api.github.com/repos/$repo"
          $notes = @'
          ## v1.5.0 Refactor

          - Removed the startup GIF/banner path for fast launch.
          - Added config-driven army presets: `broom_witch` and `electro_dragon`.
          - Added Broom Witch + Grand Warden event deployment with Rage and Eternal Tome timing.
          - Added GUI army preset switcher.
          - Fixed build naming permanently: archive `Coc-farm.zip`, folder `Coc-farm`, executable `Coc-farm.exe`.

          Download `Coc-farm.zip`, extract it, and run `Coc-farm.exe` inside the extracted `Coc-farm` folder.
          '@
          $release = $null
          try { $release = Invoke-RestMethod -Headers $headers -Uri "$api/releases/tags/$tag" -Method Get } catch { if ($_.Exception.Response.StatusCode.value__ -ne 404) { throw } }
          if ($null -eq $release) {
            $body = @{ tag_name=$tag; target_commitish=$sha; name='v1.5.0 - Army Presets and Fixed Naming'; body=$notes; draft=$false; prerelease=$false; make_latest='true' } | ConvertTo-Json
            $release = Invoke-RestMethod -Headers $headers -Uri "$api/releases" -Method Post -Body $body -ContentType 'application/json'
          } else {
            $body = @{ name='v1.5.0 - Army Presets and Fixed Naming'; body=$notes; draft=$false; prerelease=$false; make_latest='true' } | ConvertTo-Json
            $release = Invoke-RestMethod -Headers $headers -Uri "$api/releases/$($release.id)" -Method Patch -Body $body -ContentType 'application/json'
          }
          foreach ($asset in @($release.assets)) {
            if ($asset.name -eq $zip) { Invoke-RestMethod -Headers $headers -Uri "$api/releases/assets/$($asset.id)" -Method Delete | Out-Null }
          }
          $uploadUrl = $release.upload_url -replace '\{\?name,label\}', "?name=$zip"
          Invoke-RestMethod -Headers $headers -Uri $uploadUrl -Method Post -InFile $zip -ContentType 'application/zip' | Out-Null
          Write-Host "Published $zip to $tag"
