name: Apply requested source refactor

on:
  push:
    paths:
      - .github/workflows/apply-refactor-source.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refactor:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Apply source refactor
        run: python .github/scripts/apply_refactor_source.py

      - name: Validate source and tests
        shell: pwsh
        run: |
          python -m py_compile cocbot/army.py cocbot/event_broom.py cocbot/config.py cocbot/updater.py cocbot/actions.py cocbot/loop.py cocbot/__main__.py cocbot/__init__.py gui.py test_event_broom.py
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt pytest
          pytest -q test_event_broom.py

      - name: Commit refactor
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add cocbot/army.py cocbot/config.py cocbot/event_broom.py cocbot/actions.py cocbot/loop.py cocbot/__main__.py cocbot/__init__.py cocbot/updater.py gui.py build.bat CoCBot.spec test_event_broom.py run.bat
          git commit -m "refactor: remove banner, configurable armies, Broom Witch + Warden support, fixed executable naming"
          git push origin HEAD:main
