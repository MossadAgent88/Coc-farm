name: Publish v1.4.2 ZIP

on:
  push:
    paths:
      - .github/workflows/publish-v1-4-2-zip.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate source
        shell: pwsh
        run: |
          python -m py_compile cocbot/event_broom.py cocbot/config.py cocbot/updater.py cocbot/actions.py cocbot/loop.py cocbot/__init__.py gui.py test_event_broom.py
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
          pytest -q test_event_broom.py

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install pyinstaller

      - name: Build stable Windows folder package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          pyinstaller --noconfirm --clean --onedir --windowed --name cocbot --add-data "templates;templates" --collect-all customtkinter --collect-all PIL --hidden-import customtkinter --hidden-import PIL.Image --hidden-import cv2 gui.py
          if (!(Test-Path "dist/cocbot/cocbot.exe")) { throw "onedir EXE was not created" }
          Compress-Archive -Path "dist/cocbot/*" -DestinationPath "cocbot-windows-v1.4.2.zip" -Force

      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $sha = '4197f70b3e04b2712eef32f6ea58ef113e44c9e7'
          $notes = @'
          ## v1.4.2 NameError Fix

          - Fixed `NameError: name '_configured_slot_xs' is not defined` in Dump mode / Broom Witch deployment.
          - Added the missing `_configured_slot_xs()` helper in `cocbot/event_broom.py`.
          - Fixed the same deployment log path to use `slot_xs` instead of stale `slot_x`.
          - Added tests for configured slot parsing, fallback behavior, and multi-slot deployment.

          Download `cocbot-windows-v1.4.2.zip`, extract it, and run `cocbot.exe` inside the extracted folder.
          '@
          if (gh release view v1.4.2 *> $null) {
            gh release edit v1.4.2 --target $sha --title "v1.4.2 - Deployment NameError Fix" --notes $notes
          } else {
            gh release create v1.4.2 --target $sha --title "v1.4.2 - Deployment NameError Fix" --notes $notes
          }
          gh release upload v1.4.2 "cocbot-windows-v1.4.2.zip" --clobber

      - name: Remove one-time workflow
        shell: pwsh
        run: |
          Remove-Item .github/workflows/publish-v1-4-2-zip.yml -Force
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add .github/workflows/publish-v1-4-2-zip.yml
          git commit -m "Remove one-time v1.4.2 ZIP publisher"
          git push
