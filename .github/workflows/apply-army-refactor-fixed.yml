name: Apply army refactor fixed

on:
  push:
    paths:
      - .github/workflows/apply-army-refactor-fixed.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refactor-build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Apply refactor patch
        run: python .github/scripts/apply_army_refactor.py

      - name: Patch permanent CI and cleanup temporary files
        run: python .github/scripts/fix_ci_release.py

      - name: Validate source and tests
        shell: pwsh
        run: |
          python -m py_compile cocbot/army.py cocbot/event_broom.py cocbot/config.py cocbot/updater.py cocbot/actions.py cocbot/loop.py cocbot/__main__.py cocbot/__init__.py gui.py test_event_broom.py
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt pytest
          pytest -q test_event_broom.py

      - name: Commit refactor and CI fix
        id: commit
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add -A
          git commit -m "fix: resolve GitHub Actions release failure and update Node.js actions"
          git push
          $sha = git rev-parse HEAD
          "sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build fixed-name Windows package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          python -m pip install pyinstaller
          pyinstaller --noconfirm --clean --onedir --windowed --name Coc-farm --add-data "templates;templates" --collect-all customtkinter --collect-all PIL --hidden-import customtkinter --hidden-import PIL.Image --hidden-import cv2 gui.py
          if (!(Test-Path "dist/Coc-farm/Coc-farm.exe")) { throw "dist/Coc-farm/Coc-farm.exe was not created" }
          Compress-Archive -Path "dist/Coc-farm/*" -DestinationPath "Coc-farm.zip" -Force
          if (!(Test-Path "Coc-farm.zip")) { throw "Coc-farm.zip was not created" }

      - name: Publish v1.5.0 release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = 'v1.5.0'
          $zip = 'Coc-farm.zip'
          $sha = '${{ steps.commit.outputs.sha }}'
          if (-not $sha) { $sha = git rev-parse HEAD }
          if (!(Test-Path $zip)) { throw "Release asset missing: $zip" }
          $notes = @'
          ## v1.5.0 Refactor

          - Removed the startup GIF/banner path for fast launch.
          - Added config-driven army presets: `broom_witch` and `electro_dragon`.
          - Added Broom Witch + Grand Warden event deployment with Rage and Eternal Tome timing.
          - Added GUI army preset switcher.
          - Fixed build naming permanently: archive `Coc-farm.zip`, folder `Coc-farm`, executable `Coc-farm.exe`.

          Download `Coc-farm.zip`, extract it, and run `Coc-farm.exe` inside the extracted `Coc-farm` folder.
          '@

          gh release view $tag *> $null
          $exists = ($LASTEXITCODE -eq 0)
          if (-not $exists) {
            gh release create $tag $zip --target $sha --title "v1.5.0 - Army Presets and Fixed Naming" --notes $notes --latest
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "Release create failed; attempting edit/upload fallback."
          }

          gh release edit $tag --title "v1.5.0 - Army Presets and Fixed Naming" --notes $notes --latest
          if ($LASTEXITCODE -ne 0) { throw "Failed to edit release $tag" }

          for ($i = 1; $i -le 3; $i++) {
            gh release upload $tag $zip --clobber
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "Upload attempt $i failed; retrying..."
            Start-Sleep -Seconds 5
          }
          throw "Failed to upload $zip to release $tag after retries"
